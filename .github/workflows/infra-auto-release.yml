name: Release infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "bin/**"
      - "lib/**"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Create tag
        id: tag
        run: |
          LATEST=$(git tag --sort=-creatordate | grep -E '^infra-[0-9]+\.[0-9]+\.[0-9]+_games-[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          INFRA_VERSION=$(echo $LATEST | grep -oP '(?<=infra-)[\d.]+')
          GAMES_VERSION=$(echo $LATEST | grep -oP '(?<=games-)[\d.]+')

          IFS='.' read -r MAJOR MINOR PATCH <<< "$INFRA_VERSION"
          PATCH=$((PATCH + 1))

          TAG="infra-${MAJOR}.${MINOR}.${PATCH}_games-${GAMES_VERSION}"

          git tag "$TAG"
          git push origin "$TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Package game_server folder
        run: |
          tar -czf game_server.tar.gz game_server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: game_server.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
