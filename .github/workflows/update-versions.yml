name: Update version.json

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Parse tag and update version.json
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "TAGss $TAG"
          if [[ $TAG == infra/* ]]; then
            VERSION="${TAG#infra/v}"
            jq --arg v "$VERSION" '.infra = $v' version.json > tmp.json && mv tmp.json version.json
          elif [[ $TAG == games/* ]]; then
            VERSION="${TAG#games/v}"
            jq --arg v "$VERSION" '.games = $v' version.json > tmp.json && mv tmp.json version.json
          else
            echo "Tag $TAG does not match infra/ or games/ prefix, skipping."
            exit 0
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version for ${{ github.event.release.tag_name }}"
          git push origin HEAD:main
